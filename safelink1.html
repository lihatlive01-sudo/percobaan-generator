<!-- Tambahkan sebelum </body> di safelink1.html -->
<script>
// Konfigurasi
const WORKER_URL = 'https://nama-worker.kamu.workers.dev';
const ADSTERRA_NATIVE = 'YOUR_ADSTERRA_NATIVE_BANNER_CODE'; // Ganti dengan kode kamu
const ADSTERRA_POPUNDER = 'YOUR_ADSTERRA_POPUNDER_CODE';

// Parse token dari URL
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

if (!token) {
  document.body.innerHTML = '<h2>❌ Link tidak valid</h2><a href="/">← Kembali</a>';
}

// Deteksi Adblock (basic)
function isAdBlockEnabled() {
  const test = document.createElement('div');
  test.innerHTML = '&nbsp;';
  test.className = 'ad-test';
  test.style.position = 'absolute';
  test.style.left = '-9999px';
  document.body.appendChild(test);
  
  const isBlocked = test.offsetParent === null || 
                    getComputedStyle(test).display === 'none';
  document.body.removeChild(test);
  return isBlocked;
}

// Timer logic
let countdown = 10;
const timerEl = document.querySelector('#timer1'); // Sesuaikan selector

const timerInterval = setInterval(() => {
  countdown--;
  if (timerEl) timerEl.textContent = `Tunggu ${countdown} detik`;
  
  if (countdown <= 0) {
    clearInterval(timerInterval);
    unlockNextStep();
  }
}, 1000);

// Unlock ke safelink2
function unlockNextStep() {
  // Tampilkan tombol "Lanjut"
  const continueBtn = document.createElement('button');
  continueBtn.textContent = '✅ Lanjut ke Download';
  continueBtn.className = 'btn-continue';
  continueBtn.onclick = () => {
    // Trigger popunder ads (jika ada)
    if (typeof showPopunder === 'function') showPopunder();
    // Redirect ke safelink2
    window.location.href = `/safelink2.html?token=${token}`;
  };
  document.querySelector('.ads-container')?.after(continueBtn);
}

// Load Adsterra Native Banner
function loadAdsterra() {
  const container = document.getElementById('adsterra-native');
  if (container && ADSTERRA_NATIVE) {
    container.innerHTML = ADSTERRA_NATIVE;
  }
}

// Popunder trigger (opsional)
function showPopunder() {
  if (ADSTERRA_POPUNDER) {
    const popup = window.open('about:blank', '_blank');
    if (popup) {
      popup.document.write(ADSTERRA_POPUNDER);
      popup.document.close();
    }
  }
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  if (isAdBlockEnabled()) {
    document.getElementById('adblock-warning')?.classList.remove('hidden');
  }
  loadAdsterra();
});
</script>

<!-- Tambahkan elemen placeholder untuk iklan -->
<div id="adblock-warning" class="hidden warning-box">
  🚫 Matikan AdBlock untuk melanjutkan download
</div>
<div id="adsterra-native" class="ads-container"></div>
