<!-- Tambahkan di <head> player.html -->
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
<script>
const WORKER_URL = 'video-extractor.intip-me69.workers.dev';
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

// Resolve URL terenkripsi
async function resolveVideoUrl() {
  if (!token) {
    showError('Token tidak ditemukan');
    return;
  }
  
  try {
    const res = await fetch(`${WORKER_URL}/api/resolve`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: token })
    });
    
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    
    // Setup video player
    setupPlayer(data.url, data.source);
    
  } catch (e) {
    showError('Gagal memuat video: ' + e.message);
  }
}

// Setup player berdasarkan source
function setupPlayer(videoUrl, source) {
  const videoEl = document.getElementById('main-video');
  
  if (source === 'cdn' && /\.(mp4|webm)/i.test(videoUrl)) {
    // Direct video file
    videoEl.src = videoUrl;
    videoEl.style.display = 'block';
    
  } else if (['dood', 'streamtape', 'streamwish'].includes(source)) {
    // Embed from third-party (gunakan iframe tersembunyi + overlay)
    const embedUrl = getEmbedUrl(videoUrl, source);
    showEmbeddedPlayer(embedUrl);
    
  } else if (['x', 'vk'].includes(source)) {
    // Untuk X/VK: tampilkan pesan + fallback ke embed resmi
    showFallbackEmbed(videoUrl, source);
    
  } else {
    // Fallback: coba langsung sebagai video
    videoEl.src = videoUrl;
    videoEl.style.display = 'block';
  }
  
  // Tampilkan tombol download (setelah iklan)
  enableDownloadButton(videoUrl);
}

// Helper: Konversi URL ke embed URL untuk platform tertentu
function getEmbedUrl(url, source) {
  const embedMap = {
    'dood': (u) => u.replace(/dood\.(?:stream|watch|so)/, 'dood.watch/e'),
    'streamtape': (u) => u.replace('streamtape.com', 'streamtape.com/e'),
    'streamwish': (u) => u.replace(/streamwish\.(?:com|to)/, 'streamwish.to/e')
  };
  return embedMap[source]?.(url) || url;
}

// Fallback untuk X/VK (karena tidak bisa direct)
function showFallbackEmbed(originalUrl, source) {
  const container = document.getElementById('player-container');
  
  if (source === 'x') {
    // Gunakan Twitter Publish API oEmbed
    const embedCode = `<blockquote class="twitter-tweet"><a href="${originalUrl}"></a></blockquote><script async src="https://platform.twitter.com/widgets.js" charset="utf-8"><\/script>`;
    container.innerHTML = embedCode;
    
  } else if (source === 'vk') {
    // VK iframe embed (butuh video_id & hash dari URL)
    const videoId = extractVkVideoId(originalUrl);
    if (videoId) {
      container.innerHTML = `<iframe src="https://vk.com/video_ext.php?oid=${videoId}" width="640" height="360" frameborder="0" allowfullscreen></iframe>`;
    }
  }
  
  // Tampilkan pesan info
  const info = document.createElement('p');
  info.className = 'info-text';
  info.textContent = '⚠️ Video dari platform ini ditampilkan via embed resmi. Download mungkin terbatas oleh kebijakan platform.';
  container.after(info);
}

function extractVkVideoId(url) {
  // Simple parser: https://vk.com/video-12345_67890 → -12345_67890
  const match = url.match(/video(-?\d+_\d+)/);
  return match ? match[1] : null;
}

// Enable download button dengan timer iklan
function enableDownloadButton(videoUrl) {
  const downloadBtn = document.getElementById('download-btn');
  let countdown = 5;
  
  const interval = setInterval(() => {
    if (countdown <= 0) {
      clearInterval(interval);
      downloadBtn.disabled = false;
      downloadBtn.textContent = '📥 Download Video';
      downloadBtn.onclick = () => {
        // Trigger direct download
        const a = document.createElement('a');
        a.href = videoUrl;
        a.download = '';
        a.click();
      };
    } else {
      downloadBtn.textContent = `Tunggu ${countdown}s...`;
      countdown--;
    }
  }, 1000);
}

function showError(msg) {
  document.getElementById('player-container').innerHTML = `<p class="error">❌ ${msg}</p>`;
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  // Cek adblock sebelum load player
  if (isAdBlockEnabled()) {
    document.getElementById('adblock-warning')?.classList.remove('hidden');
  } else {
    resolveVideoUrl();
  }
});

// Adblock detect (sama seperti safelink1)
function isAdBlockEnabled() {
  const test = document.createElement('div');
  test.className = 'ad-test';
  test.style.position = 'absolute';
  test.style.left = '-9999px';
  document.body.appendChild(test);
  const blocked = test.offsetParent === null;
  document.body.removeChild(test);
  return blocked;
}
</script>
