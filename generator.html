<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generator</title>
  <style>
    body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px;margin:0}
    .container{max-width:600px;margin:0 auto;background:#1e293b;padding:20px;border-radius:12px}
    h1{text-align:center;margin:0 0 16px}
    .form-group{margin-bottom:16px}
    label{display:block;margin-bottom:6px;font-weight:500}
    input{width:100%;padding:10px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#fff}
    .btn{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600}
    .btn:disabled{background:#475569;cursor:not-allowed}
    .output{margin-top:20px;padding-top:16px;border-top:1px solid #334155;display:none}
    .output input{background:#0f172a;margin-bottom:8px}
    .alert{padding:10px;margin-top:12px;border-radius:6px;text-align:center;display:none}
    .alert.success{background:#064e3b;color:#34d399}
    .alert.error{background:#7f1d1d;color:#f87171}
    .hidden{display:none}
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 Generator</h1>
    
    <div class="form-group">
      <label>🔗 URL Video / Download *</label>
      <input type="url" id="inputUrl" placeholder="https://example.com/video.mp4" required>
    </div>
    
    <button class="btn" id="genBtn" onclick="generate()">⚡ Generate Link</button>
    
    <div class="alert" id="alert"></div>
    
    <div class="output" id="output">
      <label>📥 Safelink:</label>
      <input type="text" id="resultUrl" readonly onclick="this.select()">
      <button class="btn" style="background:#10b981;margin-top:8px" onclick="copyResult()">📋 Copy</button>
    </div>
  </div>

  <script>
    // ⚠️ GANTI DENGAN URL WORKER KAMU
    const WORKER_URL = 'https://video-extractor.intip-me69.workers.dev';

    async function generate() {
      const url = document.getElementById('inputUrl').value.trim();
      const btn = document.getElementById('genBtn');
      const alert = document.getElementById('alert');
      const output = document.getElementById('output');
      
      if (!url) {
        alert.textContent = '❌ URL wajib diisi';
        alert.className = 'alert error';
        alert.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ Generating...';
      alert.style.display = 'none';

      try {
        const res = await fetch(WORKER_URL + '/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: url, source: 'cdn' }),
          mode: 'cors'
        });

        const text = await res.text();
        if (!res.ok) throw new Error('Error ' + res.status + ': ' + text);
        
        const data = JSON.parse(text);
        if (data.error) throw new Error(data.error);

        document.getElementById('resultUrl').value = data.shortUrl;
        output.style.display = 'block';
        alert.textContent = '✅ Berhasil!';
        alert.className = 'alert success';
        alert.style.display = 'block';

      } catch (e) {
        alert.textContent = '❌ ' + e.message;
        alert.className = 'alert error';
        alert.style.display = 'block';
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.textContent = '⚡ Generate Link';
      }
    }

    function copyResult() {
      const el = document.getElementById('resultUrl');
      el.select();
      navigator.clipboard.writeText(el.value).then(() => {
        alert('✅ Disalin!');
      });
    }
  </script>
</body>
</html>
