<script>
  // ⚠️ PENTING: Ganti dengan URL Worker asli kamu
  const WORKER_URL = 'https://video-extractor.intip-me69.workers.dev';

  // Debug: Log konfigurasi
  console.log('🔧 WORKER_URL:', WORKER_URL);
  console.log('🌐 Current Origin:', window.location.origin);

  // Tab Switching
  function switchMode(mode, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(mode).classList.add('active');
  }

  // Copy to Clipboard
  function copyToClipboard(elementId, btn) {
    const el = document.getElementById(elementId);
    el.select();
    el.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(el.value).then(() => {
      const original = btn.innerText;
      btn.innerText = '✅ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerText = original;
        btn.classList.remove('copied');
      }, 2000);
    }).catch(err => {
      console.error('Copy failed:', err);
      alert('Gagal copy. Salin manual.');
    });
  }

  // Alert System
  function showAlert(message, type = 'success') {
    const alert = document.getElementById('alertBox');
    alert.textContent = message;
    alert.className = `alert ${type}`;
    alert.style.display = 'block';
    setTimeout(() => alert.style.display = 'none', 5000);
  }

  // Source Detection
  function detectSource(url) {
    if (!url) return 'cdn';
    if (/x\.com|twitter\.com/i.test(url)) return 'x';
    if (/vk\.com|vkvideo\.ru/i.test(url)) return 'vk';
    if (/dood\.(?:stream|watch|so)/i.test(url)) return 'dood';
    if (/streamtape\.com/i.test(url)) return 'streamtape';
    if (/streamwish\.com/i.test(url)) return 'streamwish';
    if (/\.(mp4|webm|mkv)(\?|$)/i.test(url)) return 'cdn';
    return 'unknown';
  }

  // Generate Mode 1 (Dengan Debug Lengkap)
  async function generateMode1() {
    const videoUrl = document.getElementById('videoUrl').value.trim();
    const subtitleUrl = document.getElementById('subtitleUrl').value.trim();
    let downloadUrl = document.getElementById('downloadUrlMode1').value.trim();
    
    console.log('📥 Input:', { videoUrl, subtitleUrl, downloadUrl });
    
    if (!videoUrl) { showAlert('❌ Link video wajib diisi!', 'error'); return; }
    if (!downloadUrl) downloadUrl = videoUrl;

    const btn = document.getElementById('generateBtn1');
    const originalBtnText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span> Generating...';

    try {
      console.log('📡 Fetching:', `${WORKER_URL}/api/generate`);
      
      const res = await fetch(`${WORKER_URL}/api/generate`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({ 
          url: downloadUrl, 
          source: detectSource(videoUrl) 
        }),
        mode: 'cors'
      });

      console.log('📤 Response Status:', res.status, res.statusText);
      console.log('📤 Response Headers:', [...res.headers.entries()]);

      // Baca response text dulu untuk debug
      const responseText = await res.text();
      console.log('📤 Raw Response:', responseText);

      if (!res.ok) {
        throw new Error(`Worker Error ${res.status}: ${responseText || 'Server tidak merespons'}`);
      }

      // Parse JSON setelah pastikan status OK
      let data;
      try {
        data = JSON.parse(responseText);
      } catch (e) {
        throw new Error(`Response bukan JSON valid: ${responseText}`);
      }

      if (data.error) throw new Error(data.error);

      const baseUrl = window.location.origin;
      const playerLink = `${baseUrl}/player.html?token=${data.code}`;
      
      document.getElementById('playerEmbedResult').value = playerLink;
      document.getElementById('safelinkResult').value = data.shortUrl;
      
      document.getElementById('gistPreview').value = JSON.stringify({
        id: Math.random().toString(36).substr(2, 8),
        player: playerLink,
        safelink: data.shortUrl,
        source: detectSource(videoUrl),
        subtitle: subtitleUrl || null,
        created: new Date().toISOString()
      }, null, 2);

      document.getElementById('outputSection').style.display = 'block';
      showAlert('✅ Link berhasil dibuat! Silakan copy di bawah.');
