<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Ready - Please Wait</title>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --border: #334155; --primary: #2563eb; --success: #10b981; }
    * { box-sizing: border-box; } body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 600px; margin: 40px auto; background: var(--card); padding: 28px; border-radius: 12px; text-align: center; }
    h2 { margin-top: 0; } .spinner { display: inline-block; width: 32px; height: 32px; border: 4px solid #475569; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 16px 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .timer { font-size: 1.5rem; font-weight: 700; margin: 12px 0; color: #cbd5e1; }
    .btn-download { display: none; width: 100%; padding: 16px; background: var(--success); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 20px; }
    .btn-download:hover { background: #047857; }
    .ad-placeholder { background: #0f172a; border: 1px dashed var(--border); padding: 16px; margin: 20px 0; border-radius: 8px; color: #64748b; }
    .error { color: #f87171; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>⏳ Preparing Download</h2>
    <p style="color:#94a3b8;">Please wait a moment while we prepare your download link...</p>
    
    <div class="spinner" id="loader"></div>
    <div class="timer" id="finalTimer">10 Seconds remaining</div>

    <div class="ad-placeholder">Loading advertisement...</div>

    <button class="btn-download" id="downloadBtn">📥 Download Sekarang</button>
    <p class="error hidden" id="errorMsg"></p>
  </div>

  <script>
    const WORKER_URL = 'video-extractor.intip-me69.workers.dev';
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) window.location.href = '/';

    let timeLeft = 10;
    const timerEl = document.getElementById('finalTimer');
    const btn = document.getElementById('downloadBtn');
    const loader = document.getElementById('loader');
    const errorEl = document.getElementById('errorMsg');

    const timer = setInterval(() => {
      timeLeft--;
      timerEl.textContent = `${timeLeft} Seconds remaining`;
      if (timeLeft <= 0) {
        clearInterval(timer);
        resolveLink();
      }
    }, 1000);

    async function resolveLink() {
      try {
        const res = await fetch(`${WORKER_URL}/api/resolve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: token })
        });
        const data = await res.json();
        
        if (!res.ok || data.error) throw new Error(data.error || 'Failed to resolve');

        loader.style.display = 'none';
        timerEl.style.display = 'none';
        btn.style.display = 'block';
        btn.textContent = '📥 Download Sekarang';
        
        btn.onclick = () => {
          // Open in new tab for direct download/stream
          window.open(data.url, '_blank');
          // Fallback: window.location.href = data.url;
        };
      } catch (e) {
        loader.style.display = 'none';
        timerEl.style.display = 'none';
        errorEl.textContent = `❌ ${e.message}`;
        errorEl.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
