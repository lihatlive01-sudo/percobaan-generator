<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Ready</title>
  <style>
    :root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--border:#334155;--success:#10b981;--danger:#ef4444}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:20px}
    .container{max-width:500px;margin:40px auto;background:var(--card);padding:28px;border-radius:12px;text-align:center}
    h2{margin-top:0}.spinner{display:inline-block;width:32px;height:32px;border:4px solid #475569;border-top-color:var(--success);border-radius:50%;animation:spin 1s linear infinite;margin:16px 0}
    @keyframes spin{to{transform:rotate(360deg)}}.timer{font-size:1.5rem;font-weight:700;margin:12px 0;color:#cbd5e1}
    .btn-download{display:none;width:100%;padding:16px;background:var(--success);color:#fff;border:none;border-radius:8px;font-size:1.1rem;font-weight:700;cursor:pointer;margin-top:20px}
    .btn-download:hover{background:#047857}.ad-placeholder{background:#0f172a;border:1px dashed var(--border);padding:16px;margin:20px 0;border-radius:8px;color:#64748b}
    .error{color:var(--danger);margin-top:16px;font-size:0.9rem}.hidden{display:none}
  </style>
</head>
<body>
  <div class="container">
    <h2>⏳ Preparing Download</h2>
    <p style="color:#94a3b8">Please wait while we prepare your download link...</p>
    
    <div class="spinner" id="loader"></div>
    <div class="timer" id="finalTimer">10 Seconds remaining</div>
    <div class="ad-placeholder">Loading advertisement...</div>
    
    <button class="btn-download" id="downloadBtn">📥 Download Sekarang</button>
    <p class="error hidden" id="errorMsg"></p>
  </div>

  <script>
    // ⚠️ PENTING: GANTI DENGAN URL WORKER KAMU
    const WORKER_URL = 'https://video-extractor.intip-me69.workers.dev';
    
    // Debug log
    console.log('🔧 [safelink2] WORKER_URL:', WORKER_URL);

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    console.log('🔑 [safelink2] Token:', token ? token.substring(0,20)+'...' : 'NONE');

    if (!token) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('finalTimer').textContent = '❌ Token tidak ditemukan';
      document.getElementById('errorMsg').textContent = 'Silakan generate link ulang dari generator.';
      document.getElementById('errorMsg').classList.remove('hidden');
    }

    let timeLeft = 10;
    const timerEl = document.getElementById('finalTimer');
    const btn = document.getElementById('downloadBtn');
    const loader = document.getElementById('loader');
    const errorEl = document.getElementById('errorMsg');

    // Timer countdown
    const timer = setInterval(() => {
      timeLeft--;
      timerEl.textContent = `${timeLeft} Seconds remaining`;
      if (timeLeft <= 0) {
        clearInterval(timer);
        resolveAndDownload();
      }
    }, 1000);

    // Resolve URL dari Worker
    async function resolveAndDownload() {
      try {
        console.log('📡 [safelink2] Fetching:', WORKER_URL + '/api/resolve');
        
        const res = await fetch(WORKER_URL + '/api/resolve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: token }),
          mode: 'cors'
        });

        console.log('📤 [safelink2] Status:', res.status, res.statusText);
        
        // Baca response text dulu untuk debug
        const responseText = await res.text();
        console.log('📤 [safelink2] Raw Response:', responseText.substring(0,200));

        if (!res.ok) {
          throw new Error(`Worker Error ${res.status}: ${responseText || 'Server tidak merespons'}`);
        }

        // Parse JSON setelah pastikan status OK
        let data;
        try {
          data = JSON.parse(responseText);
        } catch (e) {
          throw new Error(`Response bukan JSON valid: ${responseText}`);
        }

        if (data.error) throw new Error(data.error);

        // Tampilkan tombol download
        loader.style.display = 'none';
        timerEl.style.display = 'none';
        btn.style.display = 'block';
        
        btn.onclick = () => {
          console.log('🔗 [safelink2] Opening:', data.url);
          window.open(data.url, '_blank');
        };

      } catch (e) {
        console.error('❌ [safelink2] Error:', e);
        loader.style.display = 'none';
        timerEl.style.display = 'none';
        errorEl.textContent = `❌ ${e.message}`;
        errorEl.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
