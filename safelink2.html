<script>
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

// Final timer
let countdown = 10;
const timerEl = document.querySelector('#final-timer');

const interval = setInterval(() => {
  countdown--;
  if (timerEl) timerEl.textContent = `${countdown} Seconds remaining`;
  
  if (countdown <= 0) {
    clearInterval(interval);
    showDownloadOption();
  }
}, 1000);

function showDownloadOption() {
  // Sembunyikan loading, tampilkan tombol
  document.querySelector('.loading-state')?.classList.add('hidden');
  document.querySelector('.download-ready')?.classList.remove('hidden');
  
  // Setup tombol download (akan resolve URL via Worker)
  document.getElementById('final-download-btn')?.addEventListener('click', async () => {
    try {
      const res = await fetch(`${WORKER_URL}/api/resolve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: token })
      });
      const data = await res.json();
      
      if (data.url) {
        // Trigger download
        window.location.href = data.url;
        // Atau buka di tab baru untuk video
        // window.open(data.url, '_blank');
      }
    } catch (e) {
      alert('Gagal memulai download. Silakan coba lagi.');
    }
  });
}
</script>
